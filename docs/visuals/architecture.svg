<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TensorKiln implemented architecture</title>
  <desc id="desc">The caller constructs a verified graph, may explicitly rewrite it, compiles and independently verifies an execution plan, then runs it in a guarded arena. A separate reference interpreter supplies differential evidence in examples and tests.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#101a31"/>
    </linearGradient>
    <linearGradient id="blue-box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132b4b"/>
      <stop offset="1" stop-color="#10233d"/>
    </linearGradient>
    <linearGradient id="violet-box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2350"/>
      <stop offset="1" stop-color="#1f1b3d"/>
    </linearGradient>
    <linearGradient id="green-box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123a35"/>
      <stop offset="1" stop-color="#102d2c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020713" flood-opacity=".45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <marker id="evidence-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4b5fd"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 34px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 17px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .lane { fill: none; stroke: #25324a; stroke-width: 1.5; }
      .lane-label { fill: #94a3b8; font: 700 14px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 1.7px; }
      .box { stroke-width: 1.5; filter: url(#shadow); }
      .box-title { fill: #f8fafc; font: 700 18px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .box-copy { fill: #b9c7da; font: 500 15px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #94a3b8; font: 500 13px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .edge { fill: none; stroke: #7dd3fc; stroke-width: 2.25; marker-end: url(#arrow); }
      .evidence { fill: none; stroke: #c4b5fd; stroke-width: 2.25; stroke-dasharray: 8 7; marker-end: url(#evidence-arrow); }
      .edge-label { fill: #bae6fd; font: 600 13px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .evidence-label { fill: #ddd6fe; font: 600 13px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; }
      .pill { font: 700 12px "DejaVu Sans", Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: .5px; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="26" fill="url(#background)"/>
  <text x="54" y="64" class="title">TensorKiln: verified execution, inspectable end to end</text>
  <text x="54" y="94" class="subtitle">Implemented C++20 vertical slice · solid = API/runtime flow · dashed = example and test evidence</text>

  <rect x="38" y="122" width="1524" height="224" rx="20" class="lane"/>
  <text x="60" y="151" class="lane-label">GRAPH CONSTRUCTION · EXPLICIT REWRITES</text>

  <g>
    <rect x="62" y="184" width="196" height="104" rx="15" fill="url(#blue-box)" stroke="#38bdf8" class="box"/>
    <text x="160" y="219" text-anchor="middle" class="box-title">Caller C++ API</text>
    <text x="160" y="246" text-anchor="middle" class="box-copy">typed values + outputs</text>
    <text x="160" y="267" text-anchor="middle" class="small">no hidden importer</text>
  </g>

  <g>
    <rect x="310" y="184" width="224" height="104" rx="15" fill="url(#blue-box)" stroke="#38bdf8" class="box"/>
    <text x="422" y="219" text-anchor="middle" class="box-title">GraphBuilder</text>
    <text x="422" y="246" text-anchor="middle" class="box-copy">transactional validation</text>
    <text x="422" y="267" text-anchor="middle" class="small">owner · shape · topology · limits</text>
  </g>

  <g>
    <rect x="586" y="184" width="224" height="104" rx="15" fill="url(#green-box)" stroke="#34d399" class="box"/>
    <text x="698" y="219" text-anchor="middle" class="box-title">VerifiedGraph</text>
    <text x="698" y="246" text-anchor="middle" class="box-copy">bounded static f32 IR</text>
    <text x="698" y="267" text-anchor="middle" class="small">immutable · topological · owned</text>
  </g>

  <g>
    <rect x="862" y="174" width="402" height="124" rx="15" fill="url(#violet-box)" stroke="#a78bfa" class="box"/>
    <text x="1063" y="207" text-anchor="middle" class="box-title">Optional, caller-invoked rewrites</text>
    <text x="1063" y="236" text-anchor="middle" class="box-copy">DeadCodeElimination · StructuralCanonicalization</text>
    <text x="1063" y="260" text-anchor="middle" class="small">fresh VerifiedGraph + composable provenance</text>
    <rect x="902" y="273" width="322" height="20" rx="10" fill="#382f64"/>
    <text x="1063" y="287" text-anchor="middle" fill="#ddd6fe" class="pill">NEVER RUNS SILENTLY IN COMPILATION</text>
  </g>

  <g>
    <rect x="1316" y="184" width="220" height="104" rx="15" fill="url(#green-box)" stroke="#34d399" class="box"/>
    <text x="1426" y="219" text-anchor="middle" class="box-title">Selected graph</text>
    <text x="1426" y="246" text-anchor="middle" class="box-copy">exact caller choice</text>
    <text x="1426" y="267" text-anchor="middle" class="small">original or explicitly rewritten</text>
  </g>

  <path d="M258 236 H310" class="edge"/>
  <path d="M534 236 H586" class="edge"/>
  <path d="M810 216 H862" class="edge"/>
  <path d="M810 258 C830 258 832 315 1278 315 C1302 315 1310 285 1316 266" class="edge"/>
  <path d="M1264 236 H1316" class="edge"/>
  <text x="554" y="222" class="edge-label">finish()</text>
  <text x="1110" y="330" text-anchor="middle" class="edge-label">direct path preserves the supplied graph</text>

  <rect x="38" y="372" width="1524" height="284" rx="20" class="lane"/>
  <text x="60" y="401" class="lane-label">VERIFIED DENSE EXECUTION PATH</text>

  <g>
    <rect x="62" y="444" width="240" height="130" rx="15" fill="url(#blue-box)" stroke="#38bdf8" class="box"/>
    <text x="182" y="478" text-anchor="middle" class="box-title">ExecutionPlanCompiler</text>
    <text x="182" y="506" text-anchor="middle" class="box-copy">select dense kernels</text>
    <text x="182" y="529" text-anchor="middle" class="small">lower graph lifetimes</text>
    <text x="182" y="550" text-anchor="middle" class="small">propose verified arena offsets</text>
  </g>

  <g>
    <rect x="354" y="444" width="236" height="130" rx="15" fill="url(#violet-box)" stroke="#a78bfa" class="box"/>
    <text x="472" y="478" text-anchor="middle" class="box-title">PlanCandidate</text>
    <text x="472" y="506" text-anchor="middle" class="box-copy">kernel specs + offsets</text>
    <text x="472" y="529" text-anchor="middle" class="small">candidate-derived facts</text>
    <rect x="393" y="542" width="158" height="20" rx="10" fill="#382f64"/>
    <text x="472" y="556" text-anchor="middle" fill="#ddd6fe" class="pill">UNTRUSTED INPUT</text>
  </g>

  <g>
    <rect x="642" y="430" width="300" height="158" rx="15" fill="url(#green-box)" stroke="#34d399" class="box"/>
    <text x="792" y="465" text-anchor="middle" class="box-title">ExecutionPlanVerifier</text>
    <text x="792" y="493" text-anchor="middle" class="box-copy">independent reconstruction of</text>
    <text x="792" y="516" text-anchor="middle" class="box-copy">layouts · edges · storage · lifetimes</text>
    <text x="792" y="539" text-anchor="middle" class="box-copy">work · limits · arena placement</text>
    <text x="792" y="566" text-anchor="middle" class="small">candidate metadata is reconstructed</text>
  </g>

  <g>
    <rect x="994" y="444" width="214" height="130" rx="15" fill="url(#green-box)" stroke="#34d399" class="box"/>
    <text x="1101" y="478" text-anchor="middle" class="box-title">ExecutionPlan</text>
    <text x="1101" y="506" text-anchor="middle" class="box-copy">move-only + owning</text>
    <text x="1101" y="529" text-anchor="middle" class="small">immutable verified metadata</text>
    <text x="1101" y="550" text-anchor="middle" class="small">dense plan dump</text>
  </g>

  <g>
    <rect x="1260" y="430" width="276" height="158" rx="15" fill="url(#blue-box)" stroke="#38bdf8" class="box"/>
    <text x="1398" y="465" text-anchor="middle" class="box-title">ExecutionSession</text>
    <text x="1398" y="493" text-anchor="middle" class="box-copy">create → bind → run → result</text>
    <text x="1398" y="516" text-anchor="middle" class="small">guarded, preallocated arena</text>
    <text x="1398" y="539" text-anchor="middle" class="small">optional per-kernel write audit</text>
    <rect x="1277" y="554" width="242" height="20" rx="10" fill="#173e50"/>
    <text x="1398" y="568" text-anchor="middle" fill="#bae6fd" class="pill">NO HEAP ALLOCATION IN RUN()</text>
  </g>

  <path d="M302 509 H354" class="edge"/>
  <path d="M590 509 H642" class="edge"/>
  <path d="M942 509 H994" class="edge"/>
  <path d="M1208 509 H1260" class="edge"/>
  <path d="M1426 288 V354 H24 V509 H62" class="edge"/>
  <path d="M1426 288 V337 C1426 357 792 353 792 430" class="edge"/>
  <rect x="946" y="339" width="342" height="25" rx="12" fill="#101a31" stroke="#334155"/>
  <text x="1117" y="357" text-anchor="middle" class="edge-label">source graph is the reconstruction authority</text>

  <rect x="38" y="682" width="1524" height="178" rx="20" class="lane"/>
  <text x="60" y="711" class="lane-label">DIFFERENTIAL EVIDENCE · OUTSIDE THE PRODUCTION HOT PATH</text>

  <g>
    <rect x="102" y="744" width="252" height="82" rx="15" fill="url(#blue-box)" stroke="#38bdf8" class="box"/>
    <text x="228" y="777" text-anchor="middle" class="box-title">External f32 spans</text>
    <text x="228" y="802" text-anchor="middle" class="small">independently validated bindings</text>
  </g>

  <g>
    <rect x="452" y="734" width="286" height="102" rx="15" fill="url(#violet-box)" stroke="#a78bfa" class="box"/>
    <text x="595" y="768" text-anchor="middle" class="box-title">ReferenceInterpreter</text>
    <text x="595" y="795" text-anchor="middle" class="box-copy">separate materializing evaluators</text>
    <text x="595" y="817" text-anchor="middle" class="small">shared graph semantics, separate kernels</text>
  </g>

  <g>
    <rect x="836" y="734" width="284" height="102" rx="15" fill="url(#violet-box)" stroke="#a78bfa" class="box"/>
    <text x="978" y="768" text-anchor="middle" class="box-title">Examples + tests</text>
    <text x="978" y="795" text-anchor="middle" class="box-copy">raw-bit differential comparison</text>
    <text x="978" y="817" text-anchor="middle" class="small">evidence, not runtime work</text>
  </g>

  <g>
    <rect x="1218" y="734" width="280" height="102" rx="15" fill="url(#green-box)" stroke="#34d399" class="box"/>
    <text x="1358" y="768" text-anchor="middle" class="box-title">Verified example result</text>
    <text x="1358" y="795" text-anchor="middle" class="box-copy">plan + output + oracle agreement</text>
    <text x="1358" y="817" text-anchor="middle" class="small">replayable, deterministic evidence</text>
  </g>

  <path d="M354 785 H452" class="edge"/>
  <path d="M738 785 H836" class="evidence"/>
  <path d="M1120 785 H1218" class="evidence"/>
  <path d="M228 744 V640 C228 622 1368 630 1368 588" class="edge"/>
  <path d="M1398 588 V664 C1398 680 978 680 978 734" class="evidence"/>
  <text x="1212" y="674" text-anchor="middle" class="evidence-label">ExecutionResultView</text>
</svg>
