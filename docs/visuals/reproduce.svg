<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">How to reproduce TensorKiln evidence</title>
  <desc id="desc">A clean-clone workflow using the repository Makefile to run release verification, regenerate visual evidence, and exercise sanitizer and independent fixture checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#111b32"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#153052"/>
      <stop offset="1" stop-color="#10243e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123d37"/>
      <stop offset="1" stop-color="#102d2c"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302858"/>
      <stop offset="1" stop-color="#211c40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#020713" flood-opacity=".45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 32px "DejaVu Sans", system-ui, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 16px "DejaVu Sans", system-ui, sans-serif; }
      .box { stroke-width: 1.5; filter: url(#shadow); }
      .box-title { fill: #f8fafc; font: 700 18px "DejaVu Sans", system-ui, sans-serif; }
      .copy { fill: #b9c7da; font: 500 14px "DejaVu Sans", system-ui, sans-serif; }
      .small { fill: #94a3b8; font: 500 12px "DejaVu Sans", system-ui, sans-serif; }
      .command { fill: #bae6fd; font: 700 14px "DejaVu Sans Mono", ui-monospace, monospace; }
      .edge { fill: none; stroke: #7dd3fc; stroke-width: 2.2; marker-end: url(#arrow); }
      .lane { fill: none; stroke: #26344c; stroke-width: 1.5; }
      .lane-label { fill: #94a3b8; font: 700 13px "DejaVu Sans", system-ui, sans-serif; letter-spacing: 1.5px; }
      .pill { fill: #d1fae5; font: 700 11px "DejaVu Sans", system-ui, sans-serif; letter-spacing: .5px; }
    </style>
  </defs>

  <rect width="1400" height="620" rx="24" fill="url(#bg)"/>
  <text x="44" y="54" class="title">Reproduce the evidence from a clean clone</text>
  <text x="44" y="82" class="subtitle">C++20 compiler · Make · Python 3 standard library · no third-party runtime dependency</text>

  <rect x="34" y="108" width="1332" height="306" rx="18" class="lane"/>
  <text x="54" y="136" class="lane-label">PRIMARY RELEASE VERIFICATION</text>

  <g>
    <rect x="56" y="176" width="278" height="146" rx="15" fill="url(#blue)" stroke="#38bdf8" class="box"/>
    <text x="195" y="211" text-anchor="middle" class="box-title">One entry point</text>
    <text x="195" y="245" text-anchor="middle" class="command">make -j2 PROFILE=release test</text>
    <text x="195" y="278" text-anchor="middle" class="copy">strict compile + full verification</text>
    <text x="195" y="301" text-anchor="middle" class="small">same target used by release CI</text>
  </g>

  <g>
    <rect x="392" y="156" width="214" height="104" rx="14" fill="url(#green)" stroke="#34d399" class="box"/>
    <text x="499" y="190" text-anchor="middle" class="box-title">C++ suite</text>
    <text x="499" y="217" text-anchor="middle" class="copy">graph · compiler · arena</text>
    <text x="499" y="239" text-anchor="middle" class="small">reference + execution contracts</text>
  </g>

  <g>
    <rect x="636" y="156" width="214" height="104" rx="14" fill="url(#green)" stroke="#34d399" class="box"/>
    <text x="743" y="190" text-anchor="middle" class="box-title">Checked examples</text>
    <text x="743" y="217" text-anchor="middle" class="copy">IR · arena · dense plan</text>
    <text x="743" y="239" text-anchor="middle" class="small">deterministic stdout evidence</text>
  </g>

  <g>
    <rect x="392" y="284" width="214" height="104" rx="14" fill="url(#violet)" stroke="#a78bfa" class="box"/>
    <text x="499" y="318" text-anchor="middle" class="box-title">Allocation probe</text>
    <text x="499" y="345" text-anchor="middle" class="copy">first + repeated run()</text>
    <text x="499" y="367" text-anchor="middle" class="small">regular and audited sessions</text>
  </g>

  <g>
    <rect x="636" y="284" width="214" height="104" rx="14" fill="url(#violet)" stroke="#a78bfa" class="box"/>
    <text x="743" y="318" text-anchor="middle" class="box-title">Visual byte-check</text>
    <text x="743" y="345" text-anchor="middle" class="copy">run examples again</text>
    <text x="743" y="367" text-anchor="middle" class="small">reject stale transcript + SVG</text>
  </g>

  <g>
    <rect x="918" y="176" width="390" height="146" rx="15" fill="url(#green)" stroke="#34d399" class="box"/>
    <text x="1113" y="211" text-anchor="middle" class="box-title">Replayable release evidence</text>
    <text x="1113" y="241" text-anchor="middle" class="copy">verified plans · raw outputs · allocation audit</text>
    <text x="1113" y="266" text-anchor="middle" class="copy">SVGs + transcripts + SHA-256 manifest</text>
    <rect x="1014" y="285" width="198" height="20" rx="10" fill="#17443d"/>
    <text x="1113" y="299" text-anchor="middle" class="pill">EXAMPLE EVIDENCE · NOT A BENCHMARK</text>
  </g>

  <path d="M334 249 H366 V208 H392" class="edge"/>
  <path d="M366 249 V336 H392" class="edge"/>
  <path d="M606 208 H636" class="edge"/>
  <path d="M606 336 H636" class="edge"/>
  <path d="M850 208 H884 V249 H918" class="edge"/>
  <path d="M850 336 H884 V249" class="edge"/>

  <rect x="34" y="440" width="1332" height="144" rx="18" class="lane"/>
  <text x="54" y="468" class="lane-label">TARGETED REPRODUCTION AND HARDENING</text>

  <g>
    <rect x="56" y="492" width="386" height="66" rx="13" fill="url(#blue)" stroke="#38bdf8" class="box"/>
    <text x="76" y="519" class="command">make -j2 visuals</text>
    <text x="76" y="542" class="small">regenerate output-derived SVG, transcripts and manifest</text>
  </g>
  <g>
    <rect x="476" y="492" width="386" height="66" rx="13" fill="url(#violet)" stroke="#a78bfa" class="box"/>
    <text x="496" y="519" class="command">make sanitize</text>
    <text x="496" y="542" class="small">run the same suite with AddressSanitizer + UBSan</text>
  </g>
  <g>
    <rect x="896" y="492" width="412" height="66" rx="13" fill="url(#green)" stroke="#34d399" class="box"/>
    <text x="916" y="519" class="command">make oracle</text>
    <text x="916" y="542" class="small">byte-check the independent Python fixture generator</text>
  </g>

  <text x="1360" y="606" text-anchor="end" fill="#64748b" font-family="DejaVu Sans, system-ui, sans-serif" font-size="11">Every command above is a current Makefile target.</text>
</svg>
